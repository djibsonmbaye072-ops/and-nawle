{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AND NAWLE</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- AOS Animation -->
    <link
        href="https://unpkg.com/aos@2.3.4/dist/aos.css"
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

    <!-- Favicon -->
    <link
        rel="icon"
        href="{% static 'logo.png' %}"
    >

</head>

<body>

    <!-- Navigation -->
    {% include 'includes/navbar.html' %}

    <!-- Contenu principal -->
    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer principal -->
    {% include 'includes/footer.html' %}

    <!-- Signature développeur premium -->
    <section class="developer-credit py-3 text-center">

        <div class="container">

            <small class="developer-signature">

                <i class="bi bi-code-slash"></i>

                Architecture, développement et administration du système :

                <strong>Djibril Mbaye</strong>

                <span class="mx-2">|</span>

                Ingénieur Informatique

                <span class="mx-2">|</span>

                Technicien Biomédical

            </small>

        </div>

    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>

</html>
